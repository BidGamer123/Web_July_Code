<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/BackendApiAdress" method="POST">
          
         <input type="email" placeholder="abc@example.com" required><br>

         <input type="password" placeholder="****" required> <br>

         <input type="text" minlength="3" maxlength="10" required><br>

         <input type="tel" pattern="[0-9]{10}" placeholder="10-digit"><br>

         <input type="number"  min="18"  max="100"  step="1"><br>


        <button type="submit">Submit</button>

    </form>
</body>
</html>
