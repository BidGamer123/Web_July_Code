<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>username</label>
    <input  placeholder="Enter your name"> <br>

    <!-- Text input -->
     <input type="text" placeholder="username"> <br>

     <input type="email" placeholder="abc@example.com"><br>

     <input type="password" placeholder="****"> <br>

     <input type="search" placeholder="Search..."><br>

     <input type="url" placeholder="https://yoursite.com"><br>

     <input type="tel" placeholder="+91 9876543210"><br>

     <!-- Number Input -->
      <input type="number"  min="18"  max="100"  step="1"><br>
      <input type="range"   min="0"  max="100"  value="30"><br>


      <!-- Date and Time -->
       <input type="date">
       <input type="time">

       <input type="datetime-local">
       <input type="month">
       <input type="week"><br>

       <!-- Selection Input -->
        <input type="checkbox" >
        <label>I agreen to terms</label>


         <!-- Special Input -->
       <input type="file">
       <input type="color"><br>

      
       <!-- Validation -->
        <input type="text" required><br>

        <input type="text" minlength="3" maxlength="10"><br>

        <input type="tel" pattern="[0-9]{10}" placeholder="10-digit"><br>

        <textarea  rows="10" cols="15" placeholder="Feedback"></textarea>


</body>
</html>
